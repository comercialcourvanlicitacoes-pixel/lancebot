name: Build Windows executable

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build LanceBot.exe
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip

          $runtimeInstalled = $false

          if (Test-Path requirements.txt) {
            python -m pip install -r requirements.txt
            if ($LASTEXITCODE -eq 0) {
              $runtimeInstalled = $true
            } else {
              Write-Warning "requirements.txt failed; installing pinned runtime dependencies directly."
            }
          }

          if (-not $runtimeInstalled) {
            python -m pip install playwright==1.40.0 pytest==7.4.3 pytest-cov==4.1.0
          }

          python -m pip install pyinstaller==6.11.1
          python -c "import playwright; import PyInstaller; print('Build dependencies OK')"

      - name: Build executable
        shell: pwsh
        run: |
          if (Test-Path scripts/build_executable.py) {
            python scripts/build_executable.py --install-playwright-browser --console
          } else {
            $env:PLAYWRIGHT_BROWSERS_PATH = "0"
            python -m playwright install chromium
            python -m PyInstaller --clean --noconfirm --onedir --console --name LanceBot --collect-all playwright main.py
          }

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: LanceBot-Windows
          path: dist/LanceBot/
          if-no-files-found: error
